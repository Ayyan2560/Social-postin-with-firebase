<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Social Community</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <div class="auth-container glass-card">
        <div class="auth-header">
            <h1><i class="fas fa-rocket"></i> Community</h1>
            <h2>Welcome Back</h2>
            <p>Login to your account to continue</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required>
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder=" " required>
                <label for="password"><i class="fas fa-lock"></i> Password</label>
            </div>

            <button type="submit" class="btn-neon">
                <span>Login Now</span>
                <i class="fas fa-arrow-right"></i>
            </button>
            <button type="submit" class="btn-neon google-btn">
                <span>login with Google</span>
                <i class="fa-brands fa-chrome"></i>
            </button>

            <div class="auth-footer">
                <p>Don't have an account? <a href="../signup/index.html">Create one</a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../firebase.mjs"></script>
    <script type="module" src="./main.mjs"></script>
</body>

</html>
